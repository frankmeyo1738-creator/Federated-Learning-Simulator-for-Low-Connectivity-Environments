# Urban Zambia FedAvg — Moderate Network Impairment
# Simulates urban Sub-Saharan African connectivity: moderate latency (80–200ms),
# decent bandwidth (8.5 Mbps), low packet loss (1%), and rare dropouts (5%).
# Tests FedAvg resilience under realistic urban conditions.
# Run with: python -m src.main --config config/experiments/urban_zambia_fedavg.yaml --iid

experiment_name: "urban_zambia_fedavg"
num_clients: 10
num_rounds: 20
fraction_fit: 0.5
algorithm: "fedavg"
mu: 0.0
dataset: "mnist"
local_epochs: 2
batch_size: 32
learning_rate: 0.01
seed: 42
output_dir: "experiments/results"

network_profile:
  name: "urban_zambia"
  latency_min_ms: 80
  latency_max_ms: 200
  bandwidth_mbps: 8.5
  packet_loss_rate: 0.01
  dropout_probability: 0.05
  dropout_duration_rounds: 1
