# Non-IID variant — Dirichlet alpha=0.5
# Severe Disruption FedAvg — Extreme Network Impairment
# Simulates near-failure connectivity: very high latency (800–2000ms),
# near-unusable bandwidth (0.3 Mbps), heavy packet loss (20%), and
# aggressive client dropouts (35% per round, lasting 3 rounds each).
# Stress-tests FedAvg to find its breaking point under extreme conditions.
# Run with: python -m src.main --config config/experiments/severe_disruption_fedavg_noniid.yaml

experiment_name: "severe_disruption_fedavg_noniid"
num_clients: 10
num_rounds: 20
fraction_fit: 0.5
algorithm: "fedavg"
mu: 0.0
dataset: "mnist"
local_epochs: 2
batch_size: 32
learning_rate: 0.01
seed: 42
output_dir: "experiments/results"

network_profile:
  name: "severe_disruption"
  latency_min_ms: 800
  latency_max_ms: 2000
  bandwidth_mbps: 0.3
  packet_loss_rate: 0.20
  dropout_probability: 0.35
  dropout_duration_rounds: 3
