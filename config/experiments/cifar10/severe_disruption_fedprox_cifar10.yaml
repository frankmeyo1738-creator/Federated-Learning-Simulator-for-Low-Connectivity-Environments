# Severe Disruption FedProx — CIFAR-10 FedProx Under Extreme Network Impairment
# Same severe disruption network conditions as severe_disruption_fedavg_cifar10.yaml,
# but uses FedProx (μ=0.01) instead of FedAvg. Tests whether FedProx's proximal
# regularisation can maintain convergence on CIFAR-10 where FedAvg is expected to
# break down. Direct comparison with severe_disruption_fedavg_cifar10 demonstrates
# FedProx's robustness benefit on a harder vision task.
# Run with: python -m src.main --config config/experiments/cifar10/severe_disruption_fedprox_cifar10.yaml --iid

experiment_name: "severe_disruption_fedprox_cifar10"
num_clients: 10
num_rounds: 15
fraction_fit: 0.5
algorithm: "fedprox"
mu: 0.01
dataset: "cifar10"
local_epochs: 2
batch_size: 32
learning_rate: 0.01
seed: 42
output_dir: "experiments/results/cifar10"

network_profile:
  name: "severe_disruption"
  latency_min_ms: 800
  latency_max_ms: 2000
  bandwidth_mbps: 0.3
  packet_loss_rate: 0.20
  dropout_probability: 0.35
  dropout_duration_rounds: 3
