# Non-IID variant — Dirichlet alpha=0.5
# Baseline FedAvg — Control Experiment
# Perfect network conditions (no impairment). Establishes the accuracy
# ceiling that FedAvg can achieve without any network degradation.
# Run with: python -m src.main --config config/experiments/baseline_fedavg_noniid.yaml

experiment_name: "baseline_fedavg_noniid"
num_clients: 10
num_rounds: 20
fraction_fit: 0.5
algorithm: "fedavg"
mu: 0.0
dataset: "mnist"
local_epochs: 2
batch_size: 32
learning_rate: 0.01
seed: 42
output_dir: "experiments/results"

network_profile:
  name: "baseline"
  latency_min_ms: 1
  latency_max_ms: 5
  bandwidth_mbps: 100.0
  packet_loss_rate: 0.0
  dropout_probability: 0.0
  dropout_duration_rounds: 0
