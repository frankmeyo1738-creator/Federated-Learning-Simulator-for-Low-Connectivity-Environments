# Example Experiment Configuration
# Run with: python -m src.main --config config/experiments/example_experiment.yaml

experiment_name: "baseline_mnist_fedavg"
num_clients: 10
num_rounds: 20
fraction_fit: 0.5             # 50% of clients per round
algorithm: "fedavg"
mu: 0.0                       # Ignored for FedAvg
dataset: "mnist"
local_epochs: 1
batch_size: 32
learning_rate: 0.01
seed: 42
output_dir: "experiments/results"

network_profile:
  name: "baseline"
  latency_min_ms: 1
  latency_max_ms: 5
  bandwidth_mbps: 100.0
  packet_loss_rate: 0.0
  dropout_probability: 0.0
  dropout_duration_rounds: 0
