# Severe Disruption FedProx — FedProx Under Extreme Network Impairment
# Same severe disruption network conditions as severe_disruption_fedavg.yaml,
# but uses FedProx (μ=0.01) instead of FedAvg. This is the most challenging
# scenario: tests whether FedProx's proximal regularisation can maintain
# convergence where FedAvg is expected to break down. Direct comparison
# with severe_disruption_fedavg demonstrates FedProx's robustness benefit.
# Run with: python -m src.main --config config/experiments/severe_disruption_fedprox.yaml --iid

experiment_name: "severe_disruption_fedprox"
num_clients: 10
num_rounds: 20
fraction_fit: 0.5
algorithm: "fedprox"
mu: 0.01
dataset: "mnist"
local_epochs: 2
batch_size: 32
learning_rate: 0.01
seed: 42
output_dir: "experiments/results"

network_profile:
  name: "severe_disruption"
  latency_min_ms: 800
  latency_max_ms: 2000
  bandwidth_mbps: 0.3
  packet_loss_rate: 0.20
  dropout_probability: 0.35
  dropout_duration_rounds: 3
